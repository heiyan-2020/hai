# pins.yaml schema  (annotated reference — not loaded at runtime)
#
# Principle: every field has a concrete machine consumer. If a field is only
# for human reading and nothing checks it, it does not belong here — it rots
# into chaff. Before adding a field, answer "what does pin-audit do with it?".
#
# pins.yaml lives at the project root or under .claude-research/.
# Editing this file requires an explicit human gesture — see hooks/pre-commit.sh.

pins:
  - # id — kebab-case, unique. Referenced by code anchors (`# PIN: <id>`),
    # by audit output, and by [pin-release: <id>] commit-message gestures.
    id: enforce-tool-call-marker

    # claim — one sentence: the design decision being locked. Consumed by
    # pin-grounding (quiz stem) and pin-codex-audit (what to verify).
    claim: >-
      Inducer prompts must end with the canonical tool-call marker so the
      model is forced to emit a tool call.

    # branch — the git branch the pin was created on. Required by the fact
    # schema convention; lets cross-branch logic resolve scope.
    branch: main

    # born_at — commit hash where the decision was made. Audit / grounding
    # use it to link back to the originating change.
    born_at: "0000000"

    # status — active | retired | disabled
    #   active   : enforced by every audit
    #   retired  : permanently relaxed; retire_reason required; audit skips it
    #   disabled : temporarily off on specific branches; disabled_on required
    status: active

    # assertion — how the pin is mechanically checked. Heterogeneous by design:
    # different decisions need different probes. type is one of:
    #   pytest       : target = pytest node id        -> run pytest, exit 0 = pass
    #   command      : target = shell command         -> exit 0 = pass
    #   grep         : pattern must appear in every code_locations file
    #   grep_absent  : pattern must NOT appear in any code_locations file
    #   python       : target = python file           -> run it, exit 0 = pass
    assertion:
      type: pytest
      target: "tests/test_inducer.py::test_marker_suffix"
      # pattern: used only by grep / grep_absent

    # code_locations — files this pin anchors. The audit checks each file
    # carries a matching `# PIN: <id>` anchor (drift detection: if the anchor
    # is gone, the pinned region was moved or deleted). grep/grep_absent
    # assertions also search these files.
    code_locations:
      - "src/inducer.py"

    # disabled_on — branches where status is temporarily disabled. Only
    # meaningful when status == disabled. Toggling this list requires human
    # confirmation (the pre-commit tamper check still applies).
    disabled_on: []

    # retire_reason — required iff status == retired. Free text is fine here
    # because a retired pin is a closed decision, not an enforced one.
    retire_reason: ""

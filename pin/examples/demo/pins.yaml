# Demo project pins. Audited by scripts/pin_audit.py.
# Editing this file requires an explicit [pin-release|disable|update: <id>]
# gesture in the commit message — see hooks/commit-msg.sh.

pins:
  - id: enforce-tool-call-marker
    claim: >-
      Inducer prompts must end with the canonical tool-call marker so the model
      is forced to emit a tool call instead of free-form text.
    branch: main
    born_at: "0000000"
    status: active
    assertion:
      type: pytest
      target: "tests/test_inducer.py::test_marker_suffix"
    code_locations:
      - "src/inducer.py"
    disabled_on: []
    retire_reason: ""

  - id: decode-time-is-measured
    claim: >-
      Decode latency must be real wall-clock elapsed time, never tokens times a
      per-token rate. A synthetic decode time silently fabricates the headline.
    branch: main
    born_at: "0000000"
    status: active
    assertion:
      type: grep_absent
      pattern: "ms_per_token"
    code_locations:
      - "src/summarize.py"
      - "src/runner.py"
    disabled_on: []
    retire_reason: ""
